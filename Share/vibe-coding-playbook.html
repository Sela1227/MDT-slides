<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vibe Coding 提示詞手冊 · 40 式</title>
<style>
:root{
  --nord0:#2E3440; --nord1:#3B4252; --nord3:#4C566A;
  --nord4:#D8DEE9; --nord5:#E5E9F0; --nord6:#ECEFF4;
  --nord8:#88C0D0; --nord10:#5E81AC; --nord14:#A3BE8C;
  --brand:#FA7A35;
  --surface:#FFFFFF;
  --radius:10px;
  --mono:"SF Mono",Consolas,"Roboto Mono",monospace;
  --sans:"Microsoft JhengHei","PingFang TC","Noto Sans TC",-apple-system,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--nord6); color:var(--nord0);
  font-family:var(--sans); font-size:15px; line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
header{background:var(--nord0); color:var(--nord6); padding:30px 28px 26px}
.wrap{max-width:1180px; margin:0 auto}
.eyebrow{
  font-family:var(--mono); font-size:11px; letter-spacing:.22em;
  color:var(--nord8); text-transform:uppercase; margin:0 0 10px;
}
h1{margin:0; font-size:27px; font-weight:700; letter-spacing:.02em}
h1 em{font-style:normal; color:var(--brand); font-family:var(--mono); font-size:22px; margin-left:10px}
.sub{margin:12px 0 0; color:var(--nord4); font-size:13px; font-family:var(--mono)}

.toolbar{
  position:sticky; top:0; z-index:20;
  background:rgba(236,239,244,.94); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--nord4);
}
.toolbar .wrap{display:flex; align-items:center; gap:14px; padding:12px 28px}
#q{
  flex:1; min-width:0; font-family:var(--sans); font-size:14px;
  padding:9px 13px; border:1px solid var(--nord4); border-radius:var(--radius);
  background:var(--surface); color:var(--nord0);
}
#q:focus{outline:2px solid var(--brand); outline-offset:1px; border-color:transparent}
#count{font-family:var(--mono); font-size:12px; color:var(--nord3); white-space:nowrap}

main{max-width:1180px; margin:0 auto; padding:30px 28px 90px; display:flex; gap:38px; align-items:flex-start}
nav{position:sticky; top:70px; width:206px; flex:0 0 206px; border-left:1px solid var(--nord4)}
nav ol{list-style:none; margin:0; padding:0}
nav a{
  display:block; padding:9px 0 9px 20px; text-decoration:none;
  color:var(--nord3); font-size:13.5px; line-height:1.45;
  border-left:2px solid transparent; margin-left:-1px;
}
nav a:hover{color:var(--nord0)}
nav a.on{color:var(--nord0); font-weight:700; border-left-color:var(--brand)}
nav a .n{font-family:var(--mono); font-size:11px; color:var(--nord3); display:block; letter-spacing:.1em}
nav a.on .n{color:var(--brand)}
.content{flex:1; min-width:0}

section{margin-bottom:46px; scroll-margin-top:74px}
.sec-head{border-bottom:2px solid var(--nord0); padding-bottom:10px; margin-bottom:20px}
.sec-num{font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--brand)}
.sec-head h2{margin:3px 0 0; font-size:20px; font-weight:700}
.sec-head h2 span{font-family:var(--mono); font-size:12px; color:var(--nord3); font-weight:400; margin-left:10px}

.card{background:var(--surface); border:1px solid var(--nord4); border-radius:var(--radius); padding:18px 22px 20px; margin-bottom:14px}
.card h3{margin:0; font-size:16px; font-weight:700}
.when{margin:6px 0 13px; font-size:13.5px; color:var(--nord3)}
.prompt{
  background:var(--nord6); border:1px solid var(--nord5);
  border-left:3px solid var(--nord10); border-radius:6px;
  padding:16px 18px; font-size:14px; white-space:pre-wrap;
}
.ph{color:var(--brand); font-weight:700}
.copy{
  margin-top:12px; font-family:var(--mono); font-size:11.5px;
  background:transparent; border:1px solid var(--nord4); border-radius:6px;
  padding:6px 12px; color:var(--nord3); cursor:pointer;
}
.copy:hover{border-color:var(--nord0); color:var(--nord0)}
.copy.ok{border-color:var(--nord14); color:var(--nord14)}
.copy:focus-visible{outline:2px solid var(--brand); outline-offset:2px}

footer{border-top:1px solid var(--nord4); padding:22px 28px 60px; font-size:12.5px; color:var(--nord3)}
footer .wrap{display:flex; justify-content:flex-end}
.gecko{color:var(--brand); font-weight:700; font-family:var(--mono)}

@media (max-width:880px){
  main{flex-direction:column; gap:0; padding:22px 18px 70px}
  nav{position:static; width:100%; flex:none; border-left:0; border-bottom:1px solid var(--nord4); padding-bottom:8px; margin-bottom:24px}
  nav ol{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px}
  nav a{border-left:0; border-bottom:2px solid transparent; padding:6px 10px; white-space:nowrap}
  nav a.on{border-bottom-color:var(--brand)}
  nav a .n{display:inline; margin-right:6px}
  header,.toolbar .wrap{padding-left:18px; padding-right:18px}
}
@media print{
  .toolbar,nav,.copy{display:none}
  body{background:#fff; font-size:11pt}
  header{background:#fff; color:#000; border-bottom:2px solid #000}
  h1 em,.sec-num,.ph{color:#000}
  .card{break-inside:avoid; border-color:#999}
  main{display:block; padding:0}
}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <p class="eyebrow">Prompt Playbook · rev 2026.07.24</p>
    <h1>Vibe Coding 提示詞手冊<em>40 式</em></h1>
    <p class="sub">複製後把 <span style="color:#FA7A35">[方括號]</span> 換成你的情境</p>
  </div>
</header>

<div class="toolbar">
  <div class="wrap">
    <input id="q" type="search" placeholder="搜尋：Pandas、RAG、排程、除錯、Notion…" autocomplete="off">
    <span id="count"></span>
  </div>
</div>

<main>
  <nav aria-label="章節導覽"><ol id="nav"></ol></nav>
  <div class="content" id="content"></div>
</main>

<footer><div class="wrap"><span class="gecko">SELA</span></div></footer>

const DATA = [

     p:`我完全不懂程式，但我想要做一個『[例如：每天早上自動匯出前一日治療排程，並整理成 Excel]』的小工具。請用『辦公室分工』的比喻，告訴我需要用到哪些技術或套件（例如：誰負責抓資料、誰負責存檔）？請以表格呈現：技術名稱、功能比喻、難易度。請不要給我任何程式碼。`},

     p:`我需要一個 Python (Pandas) 腳本。任務：讀取資料夾中所有的 [月報 Excel 檔]，將裡面的 [治療人次、部位] 欄位合併。約束條件：

const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const mark = s => esc(s).replace(/\[([^\]]+)\]/g, '<span class="ph">[$1]</span>');

const nav = document.getElementById('nav');
const content = document.getElementById('content');

DATA.forEach(sec => {
  nav.insertAdjacentHTML('beforeend',
    `<li><a href="#${sec.id}" data-id="${sec.id}"><span class="n">${sec.num}</span>${sec.title}</a></li>`);

  const cards = sec.items.map(it => `
    <article class="card" data-text="${esc(it.t + ' ' + it.when + ' ' + it.p).replace(/"/g,'&quot;')}">
      <h3>${esc(it.t)}</h3>
      <p class="when">${esc(it.when)}</p>
      <div class="prompt">${mark(it.p)}</div>
      <button class="copy" type="button">複製提示詞</button>
    </article>`).join('');

  content.insertAdjacentHTML('beforeend', `
    <section id="${sec.id}">
      <div class="sec-head">
        <div class="sec-num">STAGE ${sec.num}</div>
        <h2>${esc(sec.title)}<span>${sec.items.length} 式</span></h2>
      </div>
      ${cards}
    </section>`);
});

content.addEventListener('click', e => {
  const btn = e.target.closest('.copy');
  if (!btn) return;
  const text = btn.previousElementSibling.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已複製 ✓'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '複製提示詞'; btn.classList.remove('ok'); }, 1600);
  }).catch(() => { btn.textContent = '複製失敗，請手動選取'; });
});

const q = document.getElementById('q');
const countEl = document.getElementById('count');
const cards = [...document.querySelectorAll('.card')];
const sections = [...document.querySelectorAll('section')];

function filter(){
  const k = q.value.trim().toLowerCase();
  let n = 0;
  cards.forEach(c => {
    const hit = !k || c.dataset.text.toLowerCase().includes(k);
    c.style.display = hit ? '' : 'none';
    if (hit) n++;
  });
  sections.forEach(s => {
    const any = [...s.querySelectorAll('.card')].some(c => c.style.display !== 'none');
    s.style.display = any ? '' : 'none';
  });
  countEl.textContent = k ? `${n} / 40 式符合` : '共 40 式 · 8 階段';
}
q.addEventListener('input', filter);
filter();

const links = [...document.querySelectorAll('nav a')];
const io = new IntersectionObserver(entries => {
  entries.forEach(en => {
    if (en.isIntersecting) links.forEach(a => a.classList.toggle('on', a.dataset.id === en.target.id));
  });
}, {rootMargin:'-70px 0px -70% 0px'});
sections.forEach(s => io.observe(s));
</script>
