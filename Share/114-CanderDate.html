<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114年癌症品質指標監測總覽 ｜ 彰濱秀傳紀念醫院</title>
<style>
:root{
  --font-sans:"Microsoft JhengHei","微軟正黑體","PingFang TC","Heiti TC","Noto Sans TC","Apple LiGothic","Helvetica Neue",sans-serif;
  --border-radius-md:8px; --border-radius-lg:12px;
  --color-background-page:#f6f5ef;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f1efe8;
  --color-background-tertiary:#eceae2;
  --color-background-success:#EAF3DE;
  --color-background-warning:#FAEEDA;
  --color-background-info:#E6F1FB;
  --color-text-primary:#1c1d18;
  --color-text-secondary:#54534e;
  --color-text-tertiary:#7d7c73;
  --color-text-success:#2f5a0d;
  --color-text-warning:#6f4208;
  --color-text-info:#13518f;
  --color-border-tertiary:rgba(0,0,0,.14);
  --color-border-secondary:rgba(0,0,0,.26);
  --color-border-info:#85B7EB;
  --brand:#5aa469; --brand-dark:#36703f;
  --fill-pass:#5b9216; --fill-fail:#E89212; --fill-na:#cdcabe;
  --dir-neg-bg:#E5E3FB; --dir-neg-fg:#332b80;
}
@media (prefers-color-scheme:dark){
  :root{
    --color-background-page:#15160f;
    --color-background-primary:#23241d;
    --color-background-secondary:#2b2c23;
    --color-background-tertiary:#35362b;
    --color-background-success:#2c5409;
    --color-background-warning:#6b3d06;
    --color-background-info:#0C447C;
    --color-text-primary:#f1f1ec;
    --color-text-secondary:#bab9af;
    --color-text-tertiary:#908f84;
    --color-text-success:#cbe79f;
    --color-text-warning:#FAC775;
    --color-text-info:#B5D4F4;
    --color-border-tertiary:rgba(255,255,255,.15);
    --color-border-secondary:rgba(255,255,255,.3);
    --color-border-info:#185FA5;
    --brand:#69b074; --brand-dark:#316b3c;
    --fill-pass:#8fc24e; --fill-fail:#EF9F27; --fill-na:#56554d;
    --dir-neg-bg:#3a3290; --dir-neg-fg:#d6d2f7;
  }
}
*{box-sizing:border-box}
body{margin:0;background:var(--color-background-page);color:var(--color-text-primary);font-family:var(--font-sans);font-size:18px;line-height:1.65;-webkit-font-smoothing:antialiased;font-weight:500}
.wrap{max-width:1040px;margin:0 auto;padding:0 24px 72px}
header.hdr{background:linear-gradient(180deg,var(--brand) 0%,var(--brand-dark) 100%);color:#fff;padding:30px 0}
.hdr-org{font-size:17px;opacity:.95;font-weight:600}
.hdr-title{font-size:40px;font-weight:800;margin:10px 0 4px;letter-spacing:.5px}
.hdr-sub{font-size:19px;opacity:.96;font-weight:600}
.bar-area{background:var(--color-background-page);position:sticky;top:0;z-index:5;padding:16px 0 10px;border-bottom:1px solid var(--color-border-tertiary)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:26px 0}
.mcard{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:16px 18px}
.mlab{font-size:16px;color:var(--color-text-secondary);font-weight:600}
.mval{font-size:42px;font-weight:800;line-height:1.15;margin-top:4px}
.toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.tlab{font-size:16px;color:var(--color-text-tertiary);margin-right:2px;font-weight:700}
.btn{font-size:17px;padding:8px 16px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:inherit;font-weight:600}
.btn:hover{background:var(--color-background-secondary)}
.btn.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.btn.print{margin-left:auto}
.sep{width:1px;height:24px;background:var(--color-border-tertiary);margin:0 5px}
.legend{display:flex;gap:20px;flex-wrap:wrap;font-size:16px;color:var(--color-text-secondary);margin:18px 0 6px;font-weight:600}
.legend .dot{display:inline-block;width:15px;height:15px;border-radius:3px;vertical-align:-2px;margin-right:5px}
.card{background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px 22px;margin-bottom:20px;page-break-inside:avoid}
.chead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.cname{font-size:27px;font-weight:800}
.csum{font-size:17px;color:var(--color-text-secondary);font-weight:700}
.ind{padding:16px 0;border-top:1px solid var(--color-border-tertiary)}
.ind:first-of-type{border-top:none}
.tag{font-size:15px;padding:3px 11px;border-radius:var(--border-radius-md);background:var(--color-background-tertiary);color:var(--color-text-secondary);white-space:nowrap;font-weight:700}
.dir{font-size:15px;padding:3px 12px;border-radius:var(--border-radius-md);white-space:nowrap;font-weight:800}
.dir-pos{background:var(--color-background-info);color:var(--color-text-info)}
.dir-neg{background:var(--dir-neg-bg);color:var(--dir-neg-fg)}
.zone{position:absolute;top:0;bottom:0;background:var(--fill-pass);opacity:.2}
.iname{font-size:21px;flex:1;min-width:180px;font-weight:700}
.st{font-size:16px;padding:3px 14px;border-radius:var(--border-radius-md);white-space:nowrap;font-weight:800}
.barrow{display:flex;align-items:center;gap:14px}
.track{position:relative;height:16px;border-radius:8px;background:var(--color-background-tertiary);flex:1;min-width:80px;overflow:hidden}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:8px}
.mark{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--color-text-primary);opacity:.65}
.rate{font-size:25px;font-weight:800;min-width:78px;text-align:right}
.meta{font-size:15px;color:var(--color-text-tertiary);min-width:150px;text-align:right;line-height:1.4;font-weight:600}
.calc{margin-top:12px}
.calc summary{cursor:pointer;font-size:16px;color:var(--color-text-info);font-weight:700;list-style:none;user-select:none}
.calc summary::-webkit-details-marker{display:none}
.calc summary::before{content:"▸";margin-right:7px;display:inline-block;transition:transform .15s}
.calc[open] summary::before{transform:rotate(90deg)}
.calcbox{margin-top:10px;padding:14px 16px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:17px;line-height:1.75}
.calcbox > div{margin:6px 0;display:flex;gap:10px}
.clab{flex:none;min-width:52px;font-weight:800;color:var(--color-text-secondary)}
details.team{margin-top:14px}
details.team > summary{cursor:pointer;font-size:18px;color:var(--color-text-secondary);font-weight:700;list-style:none;user-select:none}
details.team > summary::-webkit-details-marker{display:none}
details.team > summary::before{content:"▸";margin-right:7px;display:inline-block;transition:transform .15s}
details.team[open] > summary::before{transform:rotate(90deg)}
.disc{font-size:18px;color:var(--color-text-secondary);line-height:1.8;margin-top:9px;padding:14px 16px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-weight:500}
footer{font-size:15px;color:var(--color-text-tertiary);text-align:center;margin-top:34px;line-height:1.8;font-weight:600}
@media print{
  body{background:#fff;font-size:14px}
  .bar-area{position:static;border:none}.toolbar{display:none}
  header.hdr{background:#36703f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card,.mcard,.st,.fill,.mark,.track,.zone,.disc,.dir,.tag{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  details.calc{display:none}
}
</style>
</head>

{n:"指標2",t:"核心+院內",name:"IIIA期縱膈淋巴結取樣≥3站",num:0,den:0,th:80,tk:C,dir:"+",st:"na",def:"接受原發部位切除性手術的臨床IIIA期NSCLC病人，完成同側縱膈腔淋巴結取樣≥3站的比率。",mz:"分母中，完成原發部位同側縱膈腔淋巴結取樣摘除≥3站的人數。",mm:"接受腫瘤原發部位切除性手術的臨床IIIA期NSCLC人數。"},
{n:"指標3",t:"院內",name:"肺癌組織/病理學診斷率",num:61,den:61,th:98,tk:T,dir:"+",st:"pass",def:"肺癌病人中有組織細胞學或病理學診斷的比率。",mz:"分母中，有組織細胞學或病理學的人數。",mm:"肺癌的人數。"},
{n:"指標4",t:"院內",name:"NSCLC-NOS無法細分比例",num:0,den:59,th:5,tk:T,dir:"-",st:"pass",def:"NSCLC病人組織／病理學無法再細分(NSCLC-NOS)的比率。",mz:"分母中，診斷為NSCLC-NOS（無法再細分）的人數。",mm:"非小細胞肺癌的人數。"},
{n:"指標5",t:"院內",name:"IIIA期直接肺葉/全肺切除",num:0,den:0,th:90,tk:T,dir:"+",st:"na",def:"臨床IIIA期NSCLC病人首次治療為直接肺葉切除或全肺切除的比率。",mz:"分母中，首次治療為直接肺葉切除(Lobectomy)或全肺切除(Pneumonectomy)的人數。",mm:"臨床IIIA期NSCLC的人數。"},
{n:"指標6",t:"院內",name:"IIIA期非手術治療",num:0,den:0,th:80,tk:T,dir:"+",st:"na",def:"臨床IIIA期NSCLC病人未進行原發部位手術、以其他方式治療的比率。",mz:"分母中，未進行原發部位手術，以放療、化療、標靶或ablation治療的人數。",mm:"臨床IIIA期NSCLC病人未進行腫瘤原發部位手術的人數。"}]},
{c:"胸腔癌—食道癌",disc:"結果整體良好，R0切除率、淋巴結≥15顆比率皆100%，術後30天死亡率0%。本期無符合誘導性化放療後手術條件之個案，該指標為NA；團隊同意分析結果，後續持續監測。",ind:[
{n:"指標1",t:"核心+院內",name:"R0切除(切除端無殘餘癌)",num:1,den:1,th:94.39,tk:C,dir:"+",st:"pass",def:"食道癌手術切除標本切除端無殘餘侵襲性癌細胞(R0切除)的比率。（排除EMR與ESD）",mz:"分母中，切除端無殘餘侵襲性癌細胞(R0)的人數。",mm:"接受手術切除（不論是否誘導式化放療）之食道癌人數。（排除EMR與ESD）"},
{n:"指標2",t:"核心",name:"淋巴結病理檢查≥15顆",num:1,den:1,th:85.58,tk:C,dir:"+",st:"pass",def:"食道切除標本淋巴結病理檢查15顆（含）以上的比率。（排除EMR/ESD、R1及R2）",mz:"分母中，淋巴結病理檢查報告15顆（含）以上的人數。",mm:"食道癌病人進行食道切除的人數。（排除EMR/ESD、R1及R2）"},
{n:"指標3",t:"核心",name:"術後30天死亡率",num:0,den:1,th:1.39,tk:C,dir:"-",st:"pass",def:"接受食道切除手術病患於術後30天內死亡的比率。（排除緩和治療）",mz:"分母中，食道切除手術後30天內死亡的人數。",mm:"進行食道切除手術的食道癌人數。（排除緩和治療）"},
{n:"指標4",t:"核心",name:"cT4N0M0/N1-3M0引導性化放療",num:0,den:0,th:93.49,tk:C,dir:"+",st:"na",def:"cT4N0M0或cTanyN1-3M0食道癌接受治癒性手術者，有接受引導性化放療的比率。（限一生中第1個惡性腫瘤）",mz:"分母中，首次療程先接受化放療(concurrent或sequential)後再接受手術治療的人數。",mm:"臨床分期cT4N0M0或cTanyN1-3M0食道癌接受治癒性手術(esophagectomy)者。（限一生中第1個惡性腫瘤）"}]}
];
const ST={pass:{l:"達標",bg:"var(--color-background-success)",fg:"var(--color-text-success)",fill:"var(--fill-pass)"},fail:{l:"未達閾值",bg:"var(--color-background-warning)",fg:"var(--color-text-warning)",fill:"var(--fill-fail)"},na:{l:"不適用",bg:"var(--color-background-tertiary)",fg:"var(--color-text-tertiary)",fill:"var(--fill-na)"}};
const rate=i=>i.den>0?i.num/i.den*100:null;
const pct=x=>x===null?"—":x.toFixed(1)+"%";
let filt={view:"all",type:"all",dir:"all"};
function toolbar(){
  const all=D.flatMap(s=>s.ind),pos=all.filter(i=>i.dir==='+').length,neg=all.filter(i=>i.dir==='-').length;
  document.getElementById('toolbar').innerHTML=
   `<span class="tlab">檢視</span>
    <button class="btn ${filt.view==='all'?'on':''}" data-v="all">全部</button>
    <button class="btn ${filt.view==='fail'?'on':''}" data-v="fail">僅未達閾值</button>
    <span class="sep"></span>
    <span class="tlab">方向</span>
    <button class="btn ${filt.dir==='all'?'on':''}" data-d="all">不限</button>
    <button class="btn ${filt.dir==='+'?'on':''}" data-d="+">↑ 正向 ${pos}</button>
    <button class="btn ${filt.dir==='-'?'on':''}" data-d="-">↓ 負向 ${neg}</button>
    <span class="sep"></span>
    <span class="tlab">類型</span>
    <button class="btn ${filt.type==='all'?'on':''}" data-t="all">不限</button>
    <button class="btn ${filt.type==='核心'?'on':''}" data-t="核心">核心指標</button>
    <button class="btn ${filt.type==='院內'?'on':''}" data-t="院內">院內指標</button>
    <button class="btn print" id="printBtn">列印 / 存成 PDF</button>`;
  document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{filt.view=b.dataset.v;draw()});
  document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{filt.type=b.dataset.t;draw()});
  document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{filt.dir=b.dataset.d;draw()});
  document.getElementById('printBtn').onclick=()=>{document.querySelectorAll('details.team').forEach(d=>d.open=true);window.print();};
}
function draw(){
  toolbar();
  const all=D.flatMap(s=>s.ind);
  const P=all.filter(i=>i.st==='pass').length,F=all.filter(i=>i.st==='fail').length,N=all.filter(i=>i.st==='na').length;
  const achv=(P/(P+F)*100).toFixed(0);
  let h=`<div class="metrics">
    <div class="mcard"><div class="mlab">指標總數</div><div class="mval">${all.length}</div></div>
    <div class="mcard"><div class="mlab">達標</div><div class="mval" style="color:var(--color-text-success)">${P}</div></div>
    <div class="mcard"><div class="mlab">未達閾值</div><div class="mval" style="color:var(--color-text-warning)">${F}</div></div>
    <div class="mcard"><div class="mlab">不適用（分母0）</div><div class="mval" style="color:var(--color-text-tertiary)">${N}</div></div>
    <div class="mcard"><div class="mlab">有效指標達標率</div><div class="mval">${achv}%</div></div>
  </div>
  <div class="legend">
    <span><span class="dir dir-pos">↑ 正向</span>越高越佳</span>
    <span><span class="dir dir-neg">↓ 負向</span>越低越佳（死亡率等）</span>
    <span><span class="dot" style="background:var(--fill-pass)"></span>達標</span>
    <span><span class="dot" style="background:var(--fill-fail)"></span>未達閾值</span>
    <span><span class="dot" style="background:var(--fill-na)"></span>不適用</span>
    <span><span class="dot" style="background:var(--fill-pass);opacity:.2;width:22px"></span>目標達成區</span>
    <span><span class="dot" style="width:3px;height:16px;background:var(--color-text-primary);opacity:.65"></span>閾值／基準位置</span>
  </div>`;
  D.forEach(s=>{
    const inds=s.ind.filter(i=>(filt.view==='all'||i.st==='fail')&&(filt.type==='all'||i.t.includes(filt.type))&&(filt.dir==='all'||i.dir===filt.dir));
    if(!inds.length)return;
    const sp=s.ind.filter(i=>i.st==='pass').length,sf=s.ind.filter(i=>i.st==='fail').length,sn=s.ind.filter(i=>i.st==='na').length;
    h+=`<div class="card"><div class="chead"><span class="cname">${s.c}</span>
      <span class="csum">達標 ${sp}${sf?` · <span style="color:var(--color-text-warning)">未達 ${sf}</span>`:''}${sn?` · NA ${sn}`:''}</span></div>`;
    inds.forEach(i=>{
      const r=rate(i),st=ST[i.st],w=r===null?0:Math.min(r,100),mk=Math.min(i.th,100);
      const db=i.dir==='+'?`<span class="dir dir-pos">↑ 正向</span>`:`<span class="dir dir-neg">↓ 負向</span>`;
      const zone=i.dir==='+'?`left:${mk}%;right:0`:`left:0;width:${mk}%`;
      const src=i.tk==='CCAP'?'113年1-9月 CCAP':'114年 自訂閾值';
      const cnt=i.den>0?`分子 ${i.num} ／ 分母 ${i.den}`:'本期無符合分母之個案';
      h+=`<div class="ind">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          ${db}<span class="tag">${i.n}</span><span class="tag">${i.t}</span>
          <span class="iname">${i.name}</span>
          <span class="st" style="background:${st.bg};color:${st.fg}">${st.l}</span></div>
        <div class="barrow">
          <div class="track"><div class="zone" style="${zone}"></div><div class="fill" style="width:${w}%;background:${st.fill}"></div><div class="mark" style="left:${mk}%"></div></div>
          <span class="rate">${pct(r)}</span>
          <span class="meta">${i.num}/${i.den}<br>基準/閾值 ${i.th}%<br>${src}</span></div>
        <details class="calc"><summary>計算方式與定義</summary>
          <div class="calcbox">
            <div><span class="clab">定義</span><span>${i.def}</span></div>
            <div><span class="clab">分子</span><span>${i.mz}</span></div>
            <div><span class="clab">分母</span><span>${i.mm}</span></div>
            <div><span class="clab">本期</span><span>${cnt}　·　達成率 ${pct(r)}　（${src} ${i.th}%）</span></div>
          </div>
        </details></div>`;
    });
    h+=`<details class="team"><summary>團隊討論</summary><div class="disc">${s.disc}</div></details></div>`;
  });
  document.getElementById('app').innerHTML=h;
}
draw();
</script>
</body>
</html>
