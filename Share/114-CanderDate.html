<style>

}
@media (prefers-color-scheme:dark){
  :root{

    --color-background-secondary:#2a2a26;
    --color-background-tertiary:#33332e;
    --color-background-success:#27500A;
    --color-background-warning:#633806;
    --color-background-info:#0C447C;

*{box-sizing:border-box}
body{margin:0;background:var(--color-background-page);color:var(--color-text-primary);font-family:var(--font-sans);line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:920px;margin:0 auto;padding:0 20px 64px}
header.hdr{background:linear-gradient(180deg,var(--brand) 0%,var(--brand-dark) 100%);color:#fff;padding:26px 0;margin-bottom:0}
header.hdr .wrap{padding-bottom:0}
.hdr-org{font-size:13px;opacity:.92;letter-spacing:.02em}
.hdr-title{font-size:25px;font-weight:600;margin:8px 0 2px}
.hdr-sub{font-size:14px;opacity:.95}
.bar-area{background:var(--color-background-page);position:sticky;top:0;z-index:5;padding:14px 0 8px;border-bottom:0.5px solid var(--color-border-tertiary)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:22px 0}
.mcard{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.mlab{font-size:12.5px;color:var(--color-text-secondary)}
.mval{font-size:26px;font-weight:600;line-height:1.25;margin-top:2px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tlab{font-size:12px;color:var(--color-text-tertiary);margin-right:2px}
.btn{font-size:13px;padding:6px 13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:inherit}
.btn:hover{background:var(--color-background-secondary)}
.btn.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.btn.print{margin-left:auto;color:var(--color-text-secondary)}
.sep{width:1px;height:18px;background:var(--color-border-tertiary);margin:0 4px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--color-text-secondary);margin:14px 0 4px}
.legend .dot{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:-1px;margin-right:3px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 18px;margin-bottom:16px;page-break-inside:avoid}
.chead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.cname{font-size:17px;font-weight:600}
.csum{font-size:12.5px;color:var(--color-text-secondary)}
.ind{padding:11px 0;border-top:0.5px solid var(--color-border-tertiary)}
.ind:first-of-type{border-top:none}
.tag{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-tertiary);color:var(--color-text-secondary);white-space:nowrap}
.iname{font-size:14px;flex:1;min-width:130px}
.st{font-size:11px;padding:2px 10px;border-radius:var(--border-radius-md);white-space:nowrap;font-weight:600}
.barrow{display:flex;align-items:center;gap:11px}
.track{position:relative;height:9px;border-radius:6px;background:var(--color-background-tertiary);flex:1;min-width:60px;overflow:hidden}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.mark{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--color-text-primary);opacity:.55}
.rate{font-size:14.5px;font-weight:600;min-width:56px;text-align:right}
.meta{font-size:11.5px;color:var(--color-text-tertiary);min-width:122px;text-align:right;line-height:1.45}
details{margin-top:8px}
summary{cursor:pointer;font-size:13px;color:var(--color-text-secondary);list-style:none;user-select:none}
summary::-webkit-details-marker{display:none}
summary::before{content:"▸";margin-right:6px;display:inline-block;transition:transform .15s}
details[open] summary::before{transform:rotate(90deg)}
.disc{font-size:13px;color:var(--color-text-secondary);line-height:1.75;margin-top:7px;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
footer{font-size:12px;color:var(--color-text-tertiary);text-align:center;margin-top:30px;line-height:1.7}
@media print{
  body{background:#fff}
  .bar-area{position:static;border:none}.toolbar,.btn.print{display:none}
  header.hdr{background:#3d7a4d!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card,.mcard,.st,.fill,.mark,.track,.disc{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  details > *{display:block!important}
}
</style>
</head>

{c:"胸腔癌—肺癌",disc:"整體執行良好，診斷率及NSCLC次分類達院內閾值。臨床IB–II期核心指標75%未達80%閾值，未達標個案具肺功能不佳等合理臨床因素；IIIA期相關指標因無符合個案，建議持續監測並加強特殊個案原因記錄。",ind:[
{n:"指標1",t:"核心+院內",name:"IB-II期縱膈淋巴結取樣≥3站",num:3,den:4,th:80,tk:C,dir:"+",st:"fail"},
{n:"指標2",t:"核心+院內",name:"IIIA期縱膈淋巴結取樣≥3站",num:0,den:0,th:80,tk:C,dir:"+",st:"na"},
{n:"指標3",t:"院內",name:"肺癌組織/病理學診斷率",num:61,den:61,th:98,tk:T,dir:"+",st:"pass"},
{n:"指標4",t:"院內",name:"NSCLC-NOS無法細分比例",num:0,den:59,th:5,tk:T,dir:"-",st:"pass"},
{n:"指標5",t:"院內",name:"IIIA期直接肺葉/全肺切除",num:0,den:0,th:90,tk:T,dir:"+",st:"na"},
{n:"指標6",t:"院內",name:"IIIA期非手術治療",num:0,den:0,th:80,tk:T,dir:"+",st:"na"}]},
{c:"胸腔癌—食道癌",disc:"結果整體良好，R0切除率、淋巴結≥15顆比率皆100%，術後30天死亡率0%。本期無符合誘導性化放療後手術條件之個案，該指標為NA；團隊同意分析結果，後續持續監測。",ind:[
{n:"指標1",t:"核心+院內",name:"R0切除(切除端無殘餘癌)",num:1,den:1,th:94.39,tk:C,dir:"+",st:"pass"},
{n:"指標2",t:"核心",name:"淋巴結病理檢查≥15顆",num:1,den:1,th:85.58,tk:C,dir:"+",st:"pass"},
{n:"指標3",t:"核心",name:"術後30天死亡率",num:0,den:1,th:1.39,tk:C,dir:"-",st:"pass"},
{n:"指標4",t:"核心",name:"cT4N0M0/N1-3M0引導性化放療",num:0,den:0,th:93.49,tk:C,dir:"+",st:"na"}]}
];

const ST={
  pass:{l:"達標",bg:"var(--color-background-success)",fg:"var(--color-text-success)",fill:"var(--fill-pass)"},
  fail:{l:"未達閾值",bg:"var(--color-background-warning)",fg:"var(--color-text-warning)",fill:"var(--fill-fail)"},
  na:{l:"不適用",bg:"var(--color-background-tertiary)",fg:"var(--color-text-tertiary)",fill:"var(--fill-na)"}
};
const rate=i=>i.den>0?i.num/i.den*100:null;
const pct=x=>x===null?"—":x.toFixed(1)+"%";
let filt={view:"all",type:"all"};

function toolbar(){
  document.getElementById('toolbar').innerHTML=
   `<span class="tlab">檢視</span>
    <button class="btn ${filt.view==='all'?'on':''}" data-v="all">全部</button>
    <button class="btn ${filt.view==='fail'?'on':''}" data-v="fail">僅未達閾值</button>
    <span class="sep"></span>
    <span class="tlab">類型</span>
    <button class="btn ${filt.type==='all'?'on':''}" data-t="all">不限</button>
    <button class="btn ${filt.type==='核心'?'on':''}" data-t="核心">核心指標</button>
    <button class="btn ${filt.type==='院內'?'on':''}" data-t="院內">院內指標</button>
    <button class="btn print" id="printBtn">列印 / 存成 PDF</button>`;
  document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{filt.view=b.dataset.v;draw()});
  document.querySelectorAll('[data-t]').forEach(b=>b.onclick=()=>{filt.type=b.dataset.t;draw()});
  document.getElementById('printBtn').onclick=()=>{document.querySelectorAll('details').forEach(d=>d.open=true);window.print();};
}

function draw(){
  toolbar();
  const all=D.flatMap(s=>s.ind);
  const P=all.filter(i=>i.st==='pass').length,F=all.filter(i=>i.st==='fail').length,N=all.filter(i=>i.st==='na').length;
  const achv=(P/(P+F)*100).toFixed(0);
  let h=`<div class="metrics">
    <div class="mcard"><div class="mlab">指標總數</div><div class="mval">${all.length}</div></div>
    <div class="mcard"><div class="mlab">達標</div><div class="mval" style="color:var(--color-text-success)">${P}</div></div>
    <div class="mcard"><div class="mlab">未達閾值</div><div class="mval" style="color:var(--color-text-warning)">${F}</div></div>
    <div class="mcard"><div class="mlab">不適用（分母0）</div><div class="mval" style="color:var(--color-text-tertiary)">${N}</div></div>
    <div class="mcard"><div class="mlab">有效指標達標率</div><div class="mval">${achv}%</div></div>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:var(--fill-pass)"></span>達標</span>
    <span><span class="dot" style="background:var(--fill-fail)"></span>未達閾值</span>
    <span><span class="dot" style="background:var(--fill-na)"></span>不適用</span>
    <span><span class="dot" style="width:2px;height:12px;background:var(--color-text-primary);opacity:.55"></span>閾值／基準位置</span>
  </div>`;
  D.forEach(s=>{
    const inds=s.ind.filter(i=>(filt.view==='all'||i.st==='fail')&&(filt.type==='all'||i.t.includes(filt.type)));
    if(!inds.length)return;
    const sp=s.ind.filter(i=>i.st==='pass').length,sf=s.ind.filter(i=>i.st==='fail').length,sn=s.ind.filter(i=>i.st==='na').length;
    h+=`<div class="card"><div class="chead"><span class="cname">${s.c}</span>
      <span class="csum">達標 ${sp}${sf?` · <span style="color:var(--color-text-warning)">未達 ${sf}</span>`:''}${sn?` · NA ${sn}`:''}</span></div>`;
    inds.forEach(i=>{
      const r=rate(i),st=ST[i.st],w=r===null?0:Math.min(r,100),mk=Math.min(i.th,100);
      const dt=i.dir==='-'?`<span class="tag" style="background:var(--color-background-info);color:var(--color-text-info)">越低越佳</span>`:'';
      h+=`<div class="ind">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          <span class="tag">${i.n}</span><span class="tag">${i.t}</span>${dt}
          <span class="iname">${i.name}</span>
          <span class="st" style="background:${st.bg};color:${st.fg}">${st.l}</span></div>
        <div class="barrow">
          <div class="track"><div class="fill" style="width:${w}%;background:${st.fill}"></div><div class="mark" style="left:${mk}%"></div></div>
          <span class="rate">${pct(r)}</span>
          <span class="meta">${i.num}/${i.den} · 閾值 ${i.th}%<br>${i.tk==='CCAP'?'CCAP 基準':'自訂閾值'}</span></div></div>`;
    });
    h+=`<details><summary>團隊討論</summary><div class="disc">${s.disc}</div></details></div>`;
  });
  document.getElementById('app').innerHTML=h;
}
draw();
</script>
</body>
</html>
